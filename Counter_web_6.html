<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>够级记牌器(6副牌带鹰)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 16px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 70px 1fr 60px 60px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .row label {
      font-size: 15px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: none;
      outline: none;
      background: #202020;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #424242;
      color: white;
      padding: 10px 0;
      font-size: 15px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-apply {
      background: #454545;
      flex: 1;
      min-width: 120px;
    }

    .btn-reset {
      background: #730000;
      flex: 1;
      min-width: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #181818;
    }

    .remaining-normal {
      color: orange;
      font-weight: bold;
    }

    .remaining-zero {
      color: red;
      font-weight: bold;
    }

    .total {
      margin-top: 14px;
      padding: 12px;
      background: #181818;
      border-radius: 8px;
      text-align: center;
      font-size: 18px;
    }

    .tips {
      margin-top: 14px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 60px 1fr 56px 56px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>扑克牌记牌器</h1>

    <div class="grid">
      <div class="panel">
        <h2>操作区</h2>
        <div id="inputArea"></div>

        <div class="action-buttons">
          <button class="btn-apply" onclick="applyManualInput()">应用手动输入</button>
          <button class="btn-reset" onclick="resetAll()">重置</button>
        </div>

        <div class="tips">
          说明：可以直接输入“已出张数”，也可以点 + / - 自动累计。
        </div>
      </div>

      <div class="panel">
        <h2>已打出 / 剩余</h2>
        <table>
          <thead>
            <tr>
              <th>牌</th>
              <th>已打出</th>
              <th>剩余</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>

        <div class="total">
          总剩余：<span id="totalLeft">0</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const INITIAL_COUNTS = {
      "鹰": 6,
      "大王": 6,
      "小王": 6,
      "2": 24,
      "A": 24
    };

    const playedCounts = {
      "鹰": 0,
      "大王": 0,
      "小王": 0,
      "2": 0,
      "A": 0
    };

    const cards = Object.keys(INITIAL_COUNTS);

    function renderInputs() {
      const inputArea = document.getElementById("inputArea");
      inputArea.innerHTML = "";

      cards.forEach(card => {
        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
          <label>${card} 已出</label>
          <input id="input-${card}" type="number" min="0" max="${INITIAL_COUNTS[card]}" value="${playedCounts[card]}">
          <button onclick="addCard('${card}')">+${card}</button>
          <button onclick="removeCard('${card}')">-${card}</button>
        `;

        inputArea.appendChild(row);
      });
    }

    function getRemainingCounts() {
      const remaining = {};
      cards.forEach(card => {
        remaining[card] = INITIAL_COUNTS[card] - playedCounts[card];
      });
      return remaining;
    }

    function updateDisplay() {
      const remaining = getRemainingCounts();
      const resultBody = document.getElementById("resultBody");
      resultBody.innerHTML = "";

      let totalRemaining = 0;

      cards.forEach(card => {
        totalRemaining += remaining[card];

        const tr = document.createElement("tr");
        const remainClass = remaining[card] === 0 ? "remaining-zero" : "remaining-normal";

        tr.innerHTML = `
          <td>${card}</td>
          <td>${playedCounts[card]}</td>
          <td class="${remainClass}">${remaining[card]}</td>
        `;

        resultBody.appendChild(tr);

        const input = document.getElementById(`input-${card}`);
        if (input) {
          input.value = playedCounts[card];
        }
      });

      document.getElementById("totalLeft").textContent = totalRemaining;
    }

    function addCard(card) {
      if (playedCounts[card] >= INITIAL_COUNTS[card]) {
        alert(`${card} 已经没有剩余了`);
        return;
      }
      playedCounts[card] += 1;
      updateDisplay();
    }

    function removeCard(card) {
      if (playedCounts[card] <= 0) {
        return;
      }
      playedCounts[card] -= 1;
      updateDisplay();
    }

    function applyManualInput() {
      try {
        const nextValues = {};

        cards.forEach(card => {
          const raw = document.getElementById(`input-${card}`).value.trim();
          const value = Number(raw);

          if (!Number.isInteger(value) || value < 0 || value > INITIAL_COUNTS[card]) {
            throw new Error(`${card} 输入超出范围`);
          }

          nextValues[card] = value;
        });

        cards.forEach(card => {
          playedCounts[card] = nextValues[card];
        });

        updateDisplay();
      } catch (err) {
        alert("请输入合法整数，且不能超过该牌总数");
        updateDisplay();
      }
    }

    function resetAll() {
      cards.forEach(card => {
        playedCounts[card] = 0;
      });
      updateDisplay();
    }

    renderInputs();
    updateDisplay();
  </script>
</body>
</html>
